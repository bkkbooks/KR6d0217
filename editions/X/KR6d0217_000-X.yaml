front:
  text: 重刻五百問論序五百問論何為而造耶曰為俾破權執悟實道也然篤而論之如來一代說大小權實教每會必各有囑累諸大羅漢弘演小宗彌勒以權教為職文殊大乘為任等是荷擔菩提莊嚴雙樹其間豈容優劣哉及至滅後諸大祖師後先𮞏出分宗立家偏弘一門葢亦各受密囑乘願轂而來者也若慈恩基師專據深密主張瑜伽以三時教該括一化三無二有統轄眾機其極遂至乎以一乘為權三乘為實矣斯旨也始與我所弘法華之者戞戞乎不相容焉則不得不作為玄贊別立一家之說也然竊忖其意豈非木牛楊葉俯提弱喪以餘深法示教利喜者耶所謂世界故實第一義故實權誘方便皆無唐捐但稟今宗教眼未明者或眩其說將泣兩岐又彼宗徒牢執一途或恐馴致蹋順璟之禍又復焉知無或不幸而寶器受粗食者乎是論主之所以深憂遠慮而有此造也歟條章雖多大要有三焉一開顯正意為決定聲聞而翻判屬有性以敗種之論通再活之經安得今已生竟引論滅之此剡足徇屨點金成鐵不知其可二今經要在乎顯一代設化之意諸法門綱目總讓之前經然虗張名相廣開章段大小參雜今昔莫辨而大事因緣措之弗顧買櫝還珠不亦戾乎三末世弘通專為行人紛綸法相茫如烟海不見一語及于行要問橋論箭空費光景一朝瞑目色心何依此棄所急而不知務也他若事義去取訓詁同異類則抑末矣三要既呈矣庶幾教台徒確有所守及習彼宗者祛膠著或有圓種者生慕嚮焉非必圖強聒一切悉使捨彼從此也製作主意葢如斯而已矣此論智證大師之所將來趙宋時彼方已失傳最宜須寶護獨奈舊刻鹵莾訛謬相望而復靡別本可讐校慧心致疑其來也久矣每一披卷未曾不憮然而增慨也山門碩匠有守篤和尚恒惋惜不置乃據昔人所考覈及玄贊等默索精思嚴訂其譌疑者不敢輒改別為箋註三卷論定是非且略釋肯綮難通者於是從來以為不可讀委諸高閣者皆喜而讀之研之得益者寢多其孫昌宗上人銳志進學稱不愧堂搆之任比以和尚校本壽之梨棗仍以箋註分會入本論各章之下合刻之將欲以公于大方而揭論主之志於幾墜也其為功為惠亦豈小哉刻成徵余弁言余聞之喜甚乃不自揣敢攄鄙見如此且為提其要曰清涼國師有言法華云此經難信難解佛現在世猶多怨嫉況滅度後誠哉斯言若保執三乘五性不信一乘一性者深為可愍此甄簡權實絲毫不貸所謂寶山無非寶取之先擇摩尼也智證大師曰釋法華者三家三論法相天台竝是法王之一官法界之一門能為眾生之妙藥能為諸趣之津梁此四悉投機諸祖一揆所謂雪山無非藥採者期於對病也若異其異而不通於大同則於和合海分河飲水徒長見慢與夫外道諍訟何異乎雖然此猶未也智者大師之言曰方便說稱妙不妙見理之時無復權實非權非實亦無妙與不妙是故稱妙也嗚乎此何等境界安得與法界有情同造乎斯地受廣大妙法喜樂乎讀者倘幸稔知之則守篤和尚用心之苦併昌宗上人致力之勤皆為非唐設也乃是論流通日昌月盛我有望焉豈不大歡喜哉寬政六秊歲次甲寅孟秋後學六如沙門慈周撰凡例此論專對破慈恩玄贊本上代性相相拒若守護章法華秀句一乘要決等蓋皆其流亞諸祖未必閱此論而暗相發明者多今宗學者最所宜講究但恨舊本烏焉剩脫義路茅塞先師患之殫力訂正稍覺披豁註稱光山本者乃野州日光山所傳訂譌頗精先師多采用之惜乎中卷失傳本論所牒玄贊則有現本可對校其他率推徵文理究其所必當然而後從之其難決者且存舊不敢擅改換焉格上私記條數以便搜求然不與本論題下條數同者意古來傳寫經多手致此離合耳今且據現本先師校本主辨誤字若其句逗國譯未遑盡匡覽者請自裁正焉睿山南溪沙門昌宗識
